services:
  # SMB target - credentials: smbuser / letmein
  smb-target:
    image: dockurr/samba
    hostname: smb-target
    environment:
      NAME: "data"
    volumes:
      - smb-data:/storage
      - type: bind
        source: ./smb.conf
        target: /etc/samba/smb.conf
      - type: bind
        source: ./users.conf
        target: /etc/samba/users.conf
    ports:
      - "4450:445"
    networks:
      - hacknet

  # SSH target - credentials: admin / password123
  ssh-target:
    image: lscr.io/linuxserver/openssh-server:latest
    hostname: ssh-target
    environment:
      PUID: "1000"
      PGID: "1000"
      PASSWORD_ACCESS: "true"
      USER_NAME: admin
      USER_PASSWORD: password123
    ports:
      - "2222:2222"
    networks:
      - hacknet
    volumes:
      - ./ssh-config:/config

  # FTP target - credentials: ftpuser / letmein
  ftp-target:
    image: fauria/vsftpd
    hostname: ftp-target
    environment:
      FTP_USER: ftpuser
      FTP_PASS: letmein
      PASV_ENABLE: "YES"
      PASV_MIN_PORT: "21100"
      PASV_MAX_PORT: "21110"
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    networks:
      - hacknet

  # HTTP Basic Auth target - credentials: webadmin / starwars
  http-basic:
    image: nginx:alpine
    hostname: http-basic
    command:
      - sh
      - -c
      - |
        apk add --no-cache apache2-utils &&
        htpasswd -cb /etc/nginx/.htpasswd webadmin starwars &&
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        server {
          listen 80;
          server_name localhost;
          location / {
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
            root /usr/share/nginx/html;
            index index.html;
          }
        }
        EOF
        nginx -g 'daemon off;'
    ports:
      - "8080:80"
    networks:
      - hacknet

volumes:
  smb-data:

networks:
  hacknet:
