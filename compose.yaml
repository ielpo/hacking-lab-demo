services:
  # SMB target - credentials: smbuser / letmein
  smb-target:
    image: dockurr/samba
    hostname: smb-target
    environment:
      NAME: "data"
    volumes:
      - smb-data:/storage
      - ./users.conf:/etc/samba/users.conf
    ports:
      - "4450:445"
    networks:
      - hacknet

  # SSH target - credentials: admin / password123
  ssh-target:
    image: lscr.io/linuxserver/openssh-server:latest
    hostname: ssh-target
    environment:
      PUID: "1000"
      PGID: "1000"
      PASSWORD_ACCESS: "true"
      USER_NAME: admin
      USER_PASSWORD: password123
    ports:
      - "2222:2222"
    networks:
      - hacknet
    volumes:
      - ./ssh-config:/config

  # FTP target - credentials: ftpuser / letmein
  ftp-target:
    image: fauria/vsftpd
    hostname: ftp-target
    environment:
      FTP_USER: ftpuser
      FTP_PASS: letmein
      PASV_ENABLE: "YES"
      PASV_MIN_PORT: "21100"
      PASV_MAX_PORT: "21110"
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    networks:
      - hacknet

  # HTTP Basic Auth target - credentials: webadmin / dragon
  http-basic:
    image: nginx:alpine
    hostname: http-basic
    command:
      - sh
      - -c
      - |
        apk add --no-cache apache2-utils &&
        htpasswd -cb /etc/nginx/.htpasswd webadmin dragon &&
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        server {
          listen 80;
          server_name localhost;
          location / {
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
            root /usr/share/nginx/html;
            index index.html;
          }
        }
        EOF
        nginx -g 'daemon off;'
    ports:
      - "8080:80"
    networks:
      - hacknet

  # HTTP Form Login (DVWA) - credentials: admin / password
  dvwa:
    image: ghcr.io/digininja/dvwa:latest
    hostname: dvwa
    depends_on:
      - dvwa-db
    environment:
      DB_SERVER: dvwa-db
    ports:
      - "8081:80"
    networks:
      - hacknet

  dvwa-db:
    image: mariadb:10
    hostname: dvwa-db
    environment:
      MYSQL_ROOT_PASSWORD: dvwa
      MYSQL_DATABASE: dvwa
      MYSQL_USER: dvwa
      MYSQL_PASSWORD: p@ssw0rd
    volumes:
      - dvwa-db-data:/var/lib/mysql
    networks:
      - hacknet

volumes:
  dvwa-db-data:
  smb-data:

networks:
  hacknet: